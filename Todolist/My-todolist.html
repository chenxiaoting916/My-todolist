<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能待办日历 (稳定版)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366F1;
            --primary-hover: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr; /* 左侧固定宽，右侧自适应 */
            gap: 0;
            width: 100%;
            max-width: 1000px;
            height: 85vh; /* 整体高度 */
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* --- 左侧日历区域 --- */
        .calendar-section {
            background-color: #f9fafb;
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%; /* 占满容器高度 */
            overflow-y: auto;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-shrink: 0; /* 防止头部被压缩 */
        }

        .nav-btn {
            background: white; border: 1px solid var(--border-color); border-radius: 6px;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary); transition: all 0.2s;
        }
        .nav-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
            margin-bottom: 4px;
        }

        .week-day { 
            font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; 
            padding: 5px 0;
        }

        /* 日历每一天的格子 */
        .day {
            /* 强制宽高比或具体尺寸，确保显示 */
            width: 100%; 
            aspect-ratio: 1 / 1; /* 保持正方形 */
            max-width: 45px; /* 最大宽度限制 */
            margin: 0 auto; /* 居中 */
            
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; cursor: pointer; border-radius: 50%;
            transition: all 0.2s; position: relative; user-select: none;
            background-color: transparent;
            color: var(--text-main);
        }

        .day:hover:not(.empty) { background-color: #e0e7ff; color: var(--primary-color); }
        .day.active { background-color: var(--primary-color) !important; color: white !important; font-weight: bold; }
        .day.today { border: 2px solid var(--primary-color); }
        .day.empty { cursor: default; pointer-events: none; }

        /* 状态指示点 */
        .day.has-tasks::after {
            content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%;
            background-color: var(--text-secondary);
        }
        .day.all-done::after { background-color: var(--success-color); }
        .day.has-incomplete::after { background-color: var(--danger-color); }

        /* --- 概览区域 --- */
        .overview-section {
            margin-top: 15px;
            padding: 15px;
            background-color: #eef2ff;
            border-radius: var(--radius);
            text-align: center;
        }
        .progress-chart {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
        }
        .progress-chart svg {
            transform: rotate(-90deg);
        }
        .progress-bg, .progress-bar {
            fill: none;
            stroke-width: 10;
        }
        .progress-bg { stroke: #d1d5db; }
        .progress-bar {
            stroke: var(--primary-color);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease-out;
        }
        .progress-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-color);
        }
        .overview-summary {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* --- 右侧任务区域 --- */
        .todo-section { padding: 24px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .todo-header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        .date-display { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px; }

        .menu-btn {
            display: none; /* Hide by default */
            background: none; border: none; color: var(--text-main); font-size: 1.2rem;
            cursor: pointer; margin-right: 10px;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group input {
            flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px;
            outline: none; transition: all 0.3s ease-in-out; font-size: 16px;
        }
        .input-group input:focus { 
            border-color: var(--primary-color);
            box-shadow: 0 0 8px 2px rgba(99, 102, 241, 0.3); /* Enhanced Glow Effect */
        }
        
        .add-btn {
            background-color: var(--primary-color); color: white; border: none; padding: 0 20px;
            border-radius: 8px; cursor: pointer; font-weight: 500;
        }

        .tag-group, .filter-group {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;
        }

        .tag-btn, .filter-btn {
            background: #f3f4f6; border: 1px solid #e5e7eb; color: #4b5563;
            padding: 4px 12px; border-radius: 16px; font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s;
        }

        .tag-btn:hover, .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .tag-btn.selected, .filter-btn.active {
            background-color: var(--primary-color) !important;
            color: white !important;
            border-color: var(--primary-color) !important;
        }

        .section-divider {
            border: none;
            height: 1px;
            background-color: #e0e7ff; /* A lighter purple-ish tone */
            margin: 0 0 15px 0;
        }

        .task-list { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .task-item {
            display: flex; align-items: center; padding: 12px; border-bottom: 1px solid var(--border-color);
            background: white;
        }
        .task-item:hover { background-color: #f9fafb; }
        .task-item:hover .delete-btn { opacity: 1; }
        
        .task-checkbox {
            width: 20px; height: 20px; cursor: pointer; accent-color: var(--success-color);
            flex-shrink: 0;
        }
        
        .task-text-content {
            flex: 1; margin-left: 12px; word-break: break-all; line-height: 1.4; 
        }

        .task-tag {
            font-size: 0.75rem; padding: 2px 8px; border-radius: 8px; margin-left: 8px;
            font-weight: 500;
        }

        .task-tag.tag-学习 { background-color: #e0f2fe; color: #0ea5e9; }
        .task-tag.tag-生活 { background-color: #ecfdf5; color: #10b981; }
        .task-tag.tag-健身 { background-color: #fefce8; color: #eab308; }
        .task-tag.tag-工作 { background-color: #f1f5f9; color: #64748b; }

        .task-item.completed .task-text-content {
            text-decoration: line-through;
            color: #9ca3af;
            opacity: 0.6;
        }

        .task-actions {
            display: flex;
            align-items: center;
        }

        .edit-btn, .delete-btn { 
            background: none; border: none; 
            cursor: pointer; padding: 8px; font-size: 0.9rem;
            opacity: 0; transition: opacity 0.2s;
        }
        .edit-btn { color: var(--primary-color); }
        .delete-btn { color: var(--danger-color); } 

        .task-item:hover .edit-btn,
        .task-item:hover .delete-btn {
            opacity: 1;
        }

        .task-item.editing .task-text-content {
            flex: 1;
        }

        .edit-input {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid var(--primary-color);
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 弹窗 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: white; width: 90%; max-width: 450px; padding: 24px; border-radius: var(--radius);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-header { display: flex; align-items: center; margin-bottom: 15px; color: #d97706; }
        .modal-header i { font-size: 1.2rem; margin-right: 8px; }
        .modal-header h2 { font-size: 1.1rem; }
        
        .missed-list { 
            max-height: 300px; overflow-y: auto; margin-bottom: 20px; 
            border: 1px solid var(--border-color); border-radius: 8px; 
        }
        .missed-item {
            padding: 12px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between;
            align-items: center; cursor: pointer;
        }
        .missed-item:hover { background-color: #fff7ed; }
        .missed-date { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }
        
        .modal-footer { text-align: right; }
        .btn-close {
            background: var(--text-main); color: white; border: none; padding: 8px 20px;
            border-radius: 6px; cursor: pointer;
        }

        .mobile-overlay {
            display: none;
        }

        /* --- 响应式 --- */
        @media (max-width: 768px) {
            .app-container { 
                grid-template-columns: 1fr; 
                grid-template-rows: 1fr; 
                height: 95vh; 
                overflow-x: hidden; /* Prevent horizontal scroll */
            }

            .menu-btn { display: block; }
            .todo-header { display: flex; align-items: center; flex-wrap: wrap; }
            .todo-header h1 { margin-left: 0; }
            .date-display { width: 100%; margin-left: 42px; /* Align with text below button */ }

            .calendar-section { 
                position: absolute; top: 0; left: 0;
                width: 85%; max-width: 320px; height: 100%;
                z-index: 1001;
                background-color: #fff; /* Ensure it has a solid background */
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                border-right: 1px solid var(--border-color);
                padding: 15px; 
                height: 100%;
                flex-shrink: 0;
            }
            .calendar-section.visible {
                transform: translateX(0);
                box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            }

            .mobile-overlay.visible {
                display: block;
                position: absolute; top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0,0,0,0.4);
                z-index: 1000;
                transition: opacity 0.3s;
            }

            .todo-section { padding: 15px; }
            .input-group { flex-direction: column; }
            .add-btn { padding: 12px 0; }
            .delete-btn { opacity: 1; } /* 手机端始终显示删除按钮 */
        }
    </style>
</head>
<body>
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="app-container">
        <!-- 左侧：日历 -->
        <aside class="calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                <h2 id="monthYearDisplay">加载中...</h2>
                <button class="nav-btn" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <!-- 星期头 -->
            <div class="calendar-grid">
                <div class="week-day">日</div><div class="week-day">一</div><div class="week-day">二</div>
                <div class="week-day">三</div><div class="week-day">四</div><div class="week-day">五</div><div class="week-day">六</div>
            </div>
            
            <!-- 日期格子 -->
            <div id="calendarDays" class="calendar-grid">
                <!-- JS 将在这里生成日期 -->
            </div>

            <!-- 今日概览 -->
            <div class="overview-section" id="overviewSection">
                <!-- JS 将在这里生成内容 -->
            </div>
        </aside>

        <!-- 右侧：任务 -->
        <main class="todo-section">
            <div class="todo-header">
                <button class="menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
                <h1>任务清单</h1>
                <div class="date-display" id="selectedDateDisplay">请选择日期</div>
            </div>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="输入任务，回车添加..." autocomplete="off">
                <button class="add-btn" id="addTaskBtn"><i class="fas fa-plus"></i></button>
            </div>
            <div class="tag-group" id="tagSelectionGroup">
                <button class="tag-btn" data-tag="学习">学习</button>
                <button class="tag-btn" data-tag="生活">生活</button>
                <button class="tag-btn" data-tag="健身">健身</button>
                <button class="tag-btn" data-tag="工作">工作</button>
            </div>
            <hr class="section-divider">
            <div class="filter-group" id="filterButtonGroup">
                <!-- Filter buttons will be dynamically added here -->
            </div>
            <div class="task-list" id="taskList">
                <!-- JS 将在这里生成任务 -->
                <div style="text-align:center; padding: 20px; color:#9ca3af;">加载任务中...</div>
            </div>
        </main>
    </div>

    <!-- 提醒弹窗 -->
    <div class="modal-overlay" id="reminderModal">
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-bell"></i>
                <h2>您有未完成的过期任务</h2>
            </div>
            <div class="missed-list" id="missedList"></div>
            <div class="modal-footer">
                <button class="btn-close" id="closeModalBtn">知道了</button>
            </div>
        </div>
    </div>

    <script>
        // 使用 DOMContentLoaded 确保页面元素全部加载完毕后再执行脚本
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 状态数据 ---
            const state = {
                currentDate: new Date(),
                selectedDate: new Date(),
                tasks: {},
                selectedTag: null,
                currentFilter: 'all'
            };

            // --- DOM 元素引用 ---
            const els = {
                monthYear: document.getElementById('monthYearDisplay'),
                calendarDays: document.getElementById('calendarDays'),
                calendarSection: document.querySelector('.calendar-section'), // Get calendar section itself
                menuToggleBtn: document.getElementById('menuToggleBtn'),
                mobileOverlay: document.getElementById('mobileOverlay'),
                dateDisplay: document.getElementById('selectedDateDisplay'),
                taskList: document.getElementById('taskList'),
                input: document.getElementById('taskInput'),
                addBtn: document.getElementById('addTaskBtn'),
                tagSelectionGroup: document.getElementById('tagSelectionGroup'),
                filterButtonGroup: document.getElementById('filterButtonGroup'),
                modal: document.getElementById('reminderModal'),
                missedList: document.getElementById('missedList'),
                closeModalBtn: document.getElementById('closeModalBtn')
            };

            // --- 工具函数 ---

            // 生成日期Key (YYYY-MM-DD)
            function getDateKey(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            // 加载数据
            function loadData() {
                try {
                    const raw = localStorage.getItem('calendarTodos_v3');
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (typeof parsed === 'object' && parsed !== null) {
                            state.tasks = parsed;
                        }
                    }
                } catch (e) {
                    console.error("数据读取失败", e);
                    state.tasks = {};
                }
            }

            // 保存数据
            function saveData() {
                localStorage.setItem('calendarTodos_v3', JSON.stringify(state.tasks));
                renderCalendar(); // 保存后刷新日历状态点
                renderOverview(); // And update the overview
            }

            // --- 核心逻辑：计算概览数据 ---
            function calculateOverviewData() {
                const todayKey = getDateKey(new Date());
                const todayTasks = Array.isArray(state.tasks[todayKey]) ? state.tasks[todayKey] : [];
                const todayCompleted = todayTasks.filter(t => t && t.completed).length;
                const todayTotal = todayTasks.length;
                const todayRate = todayTotal > 0 ? (todayCompleted / todayTotal) : 0;

                let weekCompleted = 0;
                let weekTotal = 0;
                const today = new Date();
                const dayOfWeek = today.getDay(); // 0 (Sun) - 6 (Sat)
                const startDate = new Date(today);
                startDate.setDate(today.getDate() - dayOfWeek);

                for (let i = 0; i < 7; i++) {
                    const date = new Date(startDate);
                    date.setDate(startDate.getDate() + i);
                    const key = getDateKey(date);
                    const dayTasks = Array.isArray(state.tasks[key]) ? state.tasks[key] : [];
                    weekTotal += dayTasks.length;
                    weekCompleted += dayTasks.filter(t => t && t.completed).length;
                }

                return { todayRate, weekCompleted, weekTotal };
            }

            // --- 核心逻辑：渲染概览 ---
            function renderOverview() {
                const overviewEl = document.getElementById('overviewSection');
                if (!overviewEl) return;

                const data = calculateOverviewData();
                const percentage = Math.round(data.todayRate * 100);

                const radius = 45;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (data.todayRate * circumference);

                overviewEl.innerHTML = `
                    <div class="progress-chart">
                        <svg width="100" height="100" viewBox="0 0 100 100">
                            <circle class="progress-bg" cx="50" cy="50" r="${radius}"></circle>
                            <circle class="progress-bar" cx="50" cy="50" r="${radius}"
                                stroke-dasharray="${circumference}"
                                stroke-dashoffset="${offset}"
                            ></circle>
                        </svg>
                        <div class="progress-text">${percentage}%</div>
                    </div>
                    <div class="overview-summary">
                        本周已完成 <strong>${data.weekCompleted} / ${data.weekTotal}</strong> 任务
                    </div>
                `;
            }

            // --- 核心逻辑：渲染日历 ---
            function renderCalendar() {
                // 容错：如果元素不存在直接返回
                if (!els.calendarDays || !els.monthYear) return;

                const year = state.currentDate.getFullYear();
                const month = state.currentDate.getMonth();
                
                // 设置标题
                els.monthYear.textContent = `${year}年 ${month + 1}月`;
                
                // 清空旧日历
                els.calendarDays.innerHTML = '';

                // 计算当月第一天是星期几
                const firstDayIndex = new Date(year, month, 1).getDay();
                // 计算当月有多少天
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                const todayKey = getDateKey(new Date());
                const selectedKey = getDateKey(state.selectedDate);

                // 1. 填充前面的空白格子
                for (let i = 0; i < firstDayIndex; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day empty';
                    els.calendarDays.appendChild(emptyCell);
                }

                // 2. 填充日期
                for (let i = 1; i <= daysInMonth; i++) {
                    const dayEl = document.createElement('div');
                    dayEl.className = 'day';
                    dayEl.textContent = i;
                    
                    const currentKey = getDateKey(new Date(year, month, i));

                    // 标记今天
                    if (currentKey === todayKey) {
                        dayEl.classList.add('today');
                    }
                    // 标记选中
                    if (currentKey === selectedKey) {
                        dayEl.classList.add('active');
                    }

                    // 检查任务状态
                    const dayTasks = Array.isArray(state.tasks[currentKey]) ? state.tasks[currentKey] : [];
                    if (dayTasks.length > 0) {
                        dayEl.classList.add('has-tasks');
                        const allDone = dayTasks.every(t => t && t.completed);
                        if (allDone) {
                            dayEl.classList.add('all-done');
                        } else {
                            dayEl.classList.add('has-incomplete');
                        }
                    }

                    // 点击事件：切换选中日期
                    dayEl.onclick = () => {
                        state.selectedDate = new Date(year, month, i);
                        state.currentFilter = 'all'; // Reset filter when changing date
                        renderCalendar();
                        renderTasks();
                        // On mobile, close sidebar after selecting a date
                        if (window.innerWidth <= 768) {
                            closeMobileSidebar();
                        }
                    };

                    els.calendarDays.appendChild(dayEl);
                }
            }

            // --- 核心逻辑：渲染过滤按钮 ---
            function renderFilterButtons() {
                if (!els.filterButtonGroup) return;

                const key = getDateKey(state.selectedDate);
                const tasks = Array.isArray(state.tasks[key]) ? state.tasks[key] : [];
                const tagsInDay = ['all', ...new Set(tasks.map(t => t.tag).filter(Boolean))];

                els.filterButtonGroup.innerHTML = '';
                if (tagsInDay.length <= 1) return; // Don't show filters if only 'all' is present

                tagsInDay.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.dataset.filter = tag;
                    btn.textContent = tag === 'all' ? '全部' : tag;
                    if (tag === state.currentFilter) {
                        btn.classList.add('active');
                    }
                    btn.onclick = () => {
                        state.currentFilter = tag;
                        renderTasks();
                    };
                    els.filterButtonGroup.appendChild(btn);
                });
            }

            // --- 核心逻辑：渲染任务 ---
            function renderTasks() {
                if (!els.taskList || !els.dateDisplay) return;

                const key = getDateKey(state.selectedDate);
                const allTasks = Array.isArray(state.tasks[key]) ? state.tasks[key] : [];

                // Filter tasks
                const tasks = state.currentFilter === 'all' 
                    ? allTasks 
                    : allTasks.filter(t => t.tag === state.currentFilter);

                // 更新日期标题
                const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
                els.dateDisplay.textContent = state.selectedDate.toLocaleDateString('zh-CN', options);

                els.taskList.innerHTML = '';

                if (tasks.length === 0) {
                    const message = state.currentFilter !== 'all' ? `没有找到“${state.currentFilter}”标签的任务` : '本日无任务';
                    els.taskList.innerHTML = `
                        <div class="task-list-placeholder" style="text-align:center; padding: 40px; color:#9ca3af;">
                            <i class="fas fa-clipboard-check" style="font-size:2rem; margin-bottom:10px; opacity:0.5;"></i>
                            <p>${message}</p>
                        </div>
                    `;
                    renderFilterButtons(); // Still render filters
                    return;
                }

                tasks.forEach((task, index) => {
                    if (!task) return; // 跳过无效数据

                    const item = document.createElement('div');
                    item.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    const tagHtml = task.tag ? `<span class="task-tag tag-${task.tag}">${task.tag}</span>` : '';

                    item.innerHTML = `
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                        <div class="task-text-content">
                            <span>${task.text}</span>
                            ${tagHtml}
                        </div>
                        <div class="task-actions">
                            <button class="edit-btn"><i class="fas fa-pencil-alt"></i></button>
                            <button class="delete-btn"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;

                    // 勾选事件
                    const checkbox = item.querySelector('.task-checkbox');
                    checkbox.onchange = () => {
                        // Find the original index in allTasks
                        const originalTask = allTasks.find(t => t.text === task.text && t.tag === task.tag);
                        if(originalTask) originalTask.completed = !originalTask.completed;
                        saveData();
                        renderTasks();
                    };

                    // 删除事件
                    const delBtn = item.querySelector('.delete-btn');
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm('确定删除这个任务吗？')) {
                            const originalIndex = allTasks.findIndex(t => t.text === task.text && t.tag === task.tag);
                            if (originalIndex > -1) {
                                allTasks.splice(originalIndex, 1);
                            }
                            if (allTasks.length === 0) delete state.tasks[key];
                            saveData();
                            renderTasks();
                        }
                    };

                    // 编辑事件
                    const editBtn = item.querySelector('.edit-btn');
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        enterEditMode(item, task, allTasks);
                    };

                    els.taskList.appendChild(item);
                });
                renderFilterButtons();
            }

            // --- 核心逻辑：进入编辑模式 ---
            function enterEditMode(item, task, allTasks) {
                item.classList.add('editing');
                const textContent = item.querySelector('.task-text-content span');
                const originalText = task.text;

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'edit-input';
                input.value = originalText;

                textContent.replaceWith(input);
                input.focus();

                function save() {
                    const newText = input.value.trim();
                    if (newText && newText !== originalText) {
                        const originalTask = allTasks.find(t => t.text === originalText && t.tag === task.tag);
                        if(originalTask) originalTask.text = newText;
                        saveData();
                    }
                    renderTasks(); // Always re-render to exit edit mode
                }

                input.addEventListener('blur', save);
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        input.blur(); // Trigger blur to save
                    }
                });
            }

            // --- 核心逻辑：添加任务 ---
            function addTask() {
                const text = els.input.value.trim();
                if (!text) return;

                const key = getDateKey(state.selectedDate);
                if (!Array.isArray(state.tasks[key])) {
                    state.tasks[key] = [];
                }

                state.tasks[key].push({ text: text, completed: false, tag: state.selectedTag });
                
                // Reset input and selection
                els.input.value = '';
                if (state.selectedTag) {
                    const selectedBtn = els.tagSelectionGroup.querySelector('.selected');
                    if (selectedBtn) selectedBtn.classList.remove('selected');
                    state.selectedTag = null;
                }

                saveData();
                // If a filter is active and the new task doesn't match, switch to 'all'
                if (state.currentFilter !== 'all' && state.currentFilter !== state.selectedTag) {
                    state.currentFilter = 'all';
                }
                renderTasks();

                // Animate the new task
                const lastTaskItem = els.taskList.lastElementChild;
                if (lastTaskItem && lastTaskItem.classList.contains('task-item')) {
                    lastTaskItem.style.animation = 'fadeIn 0.4s ease-out';
                }
                els.input.focus();
            }

            // --- 提醒逻辑 ---
            function checkReminders() {
                const todayKey = getDateKey(new Date());
                let missedTasks = [];

                for (const [dateStr, tasks] of Object.entries(state.tasks)) {
                    if (dateStr < todayKey && Array.isArray(tasks)) {
                        const incomplete = tasks.filter(t => t && !t.completed);
                        if (incomplete.length > 0) {
                            incomplete.forEach(t => {
                                if(t && t.text) {
                                    missedTasks.push({ date: dateStr, text: t.text });
                                }
                            });
                        }
                    }
                }

                if (missedTasks.length > 0 && els.modal && els.missedList) {
                    // 按日期倒序
                    missedTasks.sort((a, b) => b.date.localeCompare(a.date));
                    
                    els.missedList.innerHTML = '';
                    missedTasks.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'missed-item';
                        div.innerHTML = `
                            <div>
                                <div>${item.text}</div>
                                <div class="missed-date">${item.date}</div>
                            </div>
                            <div><i class="fas fa-chevron-right" style="color:var(--primary-color)"></i></div>
                        `;
                        div.onclick = () => {
                            const [y, m, d] = item.date.split('-').map(Number);
                            state.selectedDate = new Date(y, m - 1, d);
                            state.currentDate = new Date(y, m - 1, 1);
                            closeModal();
                            renderCalendar();
                            renderTasks();
                        };
                        els.missedList.appendChild(div);
                    });
                    els.modal.classList.add('show');
                }
            }

            function closeModal() {
                if (els.modal) els.modal.classList.remove('show');
            }

            function closeMobileSidebar() {
                if (els.calendarSection) els.calendarSection.classList.remove('visible');
                if (els.mobileOverlay) els.mobileOverlay.classList.remove('visible');
            }

            // --- 事件绑定 ---
            function bindEvents() {
                // 月份切换
                const prevBtn = document.getElementById('prevMonth');
                const nextBtn = document.getElementById('nextMonth');
                
                if (prevBtn) prevBtn.onclick = () => {
                    state.currentDate.setMonth(state.currentDate.getMonth() - 1);
                    renderCalendar();
                };
                if (nextBtn) nextBtn.onclick = () => {
                    state.currentDate.setMonth(state.currentDate.getMonth() + 1);
                    renderCalendar();
                };

                // 移动端菜单切换
                if (els.menuToggleBtn) {
                    els.menuToggleBtn.onclick = () => {
                        els.calendarSection.classList.toggle('visible');
                        els.mobileOverlay.classList.toggle('visible');
                    };
                }
                // 点击遮罩层关闭
                if (els.mobileOverlay) {
                    els.mobileOverlay.onclick = closeMobileSidebar;
                }

                // 添加任务
                if (els.addBtn) els.addBtn.onclick = addTask;
                if (els.input) els.input.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };

                // 标签选择
                if (els.tagSelectionGroup) {
                    els.tagSelectionGroup.addEventListener('click', (e) => {
                        if (e.target.classList.contains('tag-btn')) {
                            const currentSelected = els.tagSelectionGroup.querySelector('.selected');
                            if (currentSelected) {
                                currentSelected.classList.remove('selected');
                            }
                            // If the clicked button was already selected, deselect it
                            if (currentSelected === e.target) {
                                state.selectedTag = null;
                            } else {
                                e.target.classList.add('selected');
                                state.selectedTag = e.target.dataset.tag;
                            }
                        }
                    });
                }

                // 弹窗关闭
                if (els.closeModalBtn) els.closeModalBtn.onclick = closeModal;
                if (els.modal) els.modal.onclick = (e) => { if (e.target === els.modal) closeModal(); };
            }

            // --- 初始化 ---
            function init() {
                loadData();
                bindEvents();
                renderCalendar();
                renderTasks();
                renderOverview(); // Initial render
                // 延迟检查提醒
                setTimeout(checkReminders, 300);
            }

            // 启动应用
            init();
        });
    </script>
</body>
</html>
